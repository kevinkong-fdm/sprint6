version: "3.9"
services:
  mysql:
    image: mysql:8.4
    container_name: banking-auth-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: banking_auth
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: banking
      MYSQL_PASSWORD: banking
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
