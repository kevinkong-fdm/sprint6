server:
  port: 8080

spring:
  application:
    name: banking-auth
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/banking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Castleclash123!
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
